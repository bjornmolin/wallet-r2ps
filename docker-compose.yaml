name: r2ps-dev

services:
  wallet-bff-1:
    build:
      context: .
      dockerfile: wallet-bff/Containerfile
    ports:
      - "8091:8088"
    restart: on-failure
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:19092,kafka-2:19092,kafka-3:19092"
      KAFKA_BROKER_ADDRESS_FAMILY: "v4"
      KAFKA_GROUP_ID: "r2ps-rest-api-group"
      REDIS_HOST: "valkey"
      REDIS_PORT: 6379
      REDIS_USERNAME: "default"
      REDIS_PASSWORD: "secret"
      REDIS_DATABASE: 0
      SERVER_PORT: 8088
      SERVE_SYNC: "true"
      SYNC_TIMEOUT_MS: 3000
      RESPONSE_TTL_SECONDS: 600
      HSM_WORKER_RESPONSE_TOPIC: "hsm-worker-responses-bff-1"
      STATE_INIT_RESPONSE_TOPIC: "state-init-responses-bff-1"
      RUST_LOG: "wallet_bff=info,rdkafka=warn,redis=warn"
    networks:
      - wallet-network

  wallet-bff-2:
    build:
      context: .
      dockerfile: wallet-bff/Containerfile
    ports:
      - "8092:8088"
    restart: on-failure
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:19092,kafka-2:19092,kafka-3:19092"
      KAFKA_BROKER_ADDRESS_FAMILY: "v4"
      KAFKA_GROUP_ID: "r2ps-rest-api-group"
      REDIS_HOST: "valkey"
      REDIS_PORT: 6379
      REDIS_USERNAME: "default"
      REDIS_PASSWORD: "secret"
      REDIS_DATABASE: 0
      SERVER_PORT: 8088
      SERVE_SYNC: "true"
      SYNC_TIMEOUT_MS: 3000
      RESPONSE_TTL_SECONDS: 600
      HSM_WORKER_RESPONSE_TOPIC: "hsm-worker-responses-bff-2"
      STATE_INIT_RESPONSE_TOPIC: "state-init-responses-bff-2"
      RUST_LOG: "wallet_bff=info,rdkafka=warn,redis=warn"
    networks:
      - wallet-network

  wallet-bff-lb:
    image: nginx:alpine
    ports:
      - "8088:8088"
    restart: on-failure
    volumes:
      - ./config/nginx-bff.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - wallet-bff-1
      - wallet-bff-2
    networks:
      - wallet-network

  hsm-worker:
    build:
      context: .
      dockerfile: hsm-worker/Containerfile
    env_file:
      - .env.softhsm
      - .env.opaque
    environment:
      RUST_LOG: info
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:19092,kafka-2:19092,kafka-3:19092"
    volumes:
      - softhsm-tokens:/myuser/softhsm/tokens:rw
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    networks:
      - wallet-network

  valkey:
    image: valkey/valkey:8.0.2-alpine3.21
    ports:
      - 6379:6379
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]
    volumes:
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf
    networks:
      - wallet-network

  x-kafka-common: &kafka-common
    image: apache/kafka-native:latest
    environment: &kafka-env
      KAFKA_CLUSTER_ID: NjM0OUVDRTItMTg2Ni00QU
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  kafka-1:
    <<: *kafka-common
    container_name: kafka-1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:19092,EXTERNAL://localhost:9092
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 19092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - wallet-network

  kafka-2:
    <<: *kafka-common
    container_name: kafka-2
    ports:
      - "9093:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:19092,EXTERNAL://localhost:9093
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 19092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - wallet-network
  kafka-3:
    <<: *kafka-common
    container_name: kafka-3
    ports:
      - "9094:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:19092,EXTERNAL://localhost:9094
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 19092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - wallet-network

  init-kafka:
    image: apache/kafka:latest
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-e", "/tmp/init-kafka-topics.sh"]
    volumes:
      - ./config/init-kafka-topics.sh:/tmp/init-kafka-topics.sh

    networks:
      - wallet-network
  # Optional: Kafka UI for management
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: wallet-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:19092,kafka-2:19092,kafka-3:19092
    networks:
      - wallet-network

volumes:
  softhsm-tokens:
    name: softhsm-tokens
    driver: local

networks:
  wallet-network:
    driver: bridge
