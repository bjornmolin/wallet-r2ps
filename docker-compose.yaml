name: r2ps-dev

services:

  r2ps-rest-api:
    build:
      context: .
      dockerfile: ./r2ps-rest-api/Containerfile
    ports:
      - "8088:8088"
      - "9012:8000"
    restart: on-failure
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-1:19092,kafka-2:19092,kafka-3:19092"
      SPRING_DATA_REDIS_HOST: "valkey"
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_USERNAME: "default"
      SPRING_DATA_REDIS_PASSWORD: "secret"
      SPRING_DATA_REDIS_DATABASE: 0
      TZ: "Europe/Stockholm"
    env_file: .env
    networks:
      - wallet-network

  rust-r2ps-worker:
    build:
      context: ./rust-r2ps-worker
      dockerfile: Containerfile
    env_file:
      - .env.softhsm
      - .env.opaque
    environment:
      RUST_LOG: info
      BOOTSTRAP_SERVERS: "kafka-1:19092,kafka-2:19092,kafka-3:19092"
    volumes:
      - ./softhsm-tokens:/myuser/softhsm/tokens:rw
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    networks:
      - wallet-network

  valkey:
    image: valkey/valkey:8.0.2-alpine3.21
    ports:
      - 6379:6379
    command: [ "valkey-server", "/usr/local/etc/valkey/valkey.conf" ]
    volumes:
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf
    networks:
      - wallet-network

  x-kafka-common: &kafka-common
    image: apache/kafka-native:latest
    environment: &kafka-env
      KAFKA_CLUSTER_ID: NjM0OUVDRTItMTg2Ni00QU
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'

  kafka-1:
    <<: *kafka-common
    container_name: kafka-1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:19092,EXTERNAL://localhost:9092
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 19092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - wallet-network

  kafka-2:
    <<: *kafka-common
    container_name: kafka-2
    ports:
      - "9093:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:19092,EXTERNAL://localhost:9093
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 19092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - wallet-network
  kafka-3:
    <<: *kafka-common
    container_name: kafka-3
    ports:
      - "9094:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:19092,EXTERNAL://localhost:9094
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 19092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - wallet-network

  init-kafka:
    image: apache/kafka:latest
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-e", "/tmp/init-kafka-topics.sh"]
    volumes:
      - ./config/init-kafka-topics.sh:/tmp/init-kafka-topics.sh

    networks:
      - wallet-network
  # Optional: Kafka UI for management
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: wallet-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:19092,kafka-2:19092,kafka-3:19092
    networks:
      - wallet-network

networks:
  wallet-network:
    driver: bridge
