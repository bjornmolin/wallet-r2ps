# Pinned toolchain for reproducible builds. Bumping the channel here is the
# single point of change for CI (reusable-ci's build-rust.yml and lint-rust.yml
# auto-detect this file) and local development (`rustup show` honours it).
[toolchain]
channel = "1.94"
components = ["clippy", "rustfmt"]
profile = "minimal"
