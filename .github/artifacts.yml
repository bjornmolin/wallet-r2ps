# Artifacts Configuration for wallet-r2ps
# Defines what to build and where to publish

artifacts:
  - name: hsm-worker
    project-type: rust
    working-directory: ./hsm-worker
    build-type: application

  - name: wallet-bff
    project-type: rust
    working-directory: ./wallet-bff
    build-type: application

containers:
  - name: hsm-worker
    from: [hsm-worker]
    container-file: Containerfile
    context: ./hsm-worker
    platforms: linux/amd64,linux/arm64
    registry: ghcr.io

  - name: wallet-bff
    from: [wallet-bff]
    container-file: Containerfile
    context: ./wallet-bff
    platforms: linux/amd64,linux/arm64
    registry: ghcr.io

publishers:
  - type: github-packages
    artifacts: [hsm-worker, wallet-bff]
