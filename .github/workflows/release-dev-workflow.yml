# Release Workflow Dev
#
# This workflow triggers the dev release orchestrator for development and feature branches.
# It creates dev-tagged artifacts and container images for testing.
#
# Triggers:
# - Manual workflow dispatch
#
# Created artifacts:
# - Container images with dev tags
# - See release summary for full details

name: Release Workflow Dev

on:
  workflow_dispatch:

jobs:
  dev-release:
    permissions:
      contents: read # Read code for building
      packages: write # Push dev images to ghcr.io
    uses: diggsweden/reusable-ci/.github/workflows/release-dev-orchestrator.yml@4113becb930aa8ee43e456256e703caf9f86b633 # v2.8.1
    with:
      reusable-ci-ref: 4113becb930aa8ee43e456256e703caf9f86b633
      project-type: cargo
      # artifacts-config opts into the multi-container dev release path:
      # one job per container in the same dev run, parallel matrix.
      # Both hsm-worker and wallet-bff are built each time this workflow
      # is dispatched.
      artifacts-config: .github/artifacts.yml
      # SBOM coverage covered by wallet-backend-reference's dev runs.
      # Keep r2ps on the default `none` for faster dev feedback.
    secrets: inherit
