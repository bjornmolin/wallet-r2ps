# Release Workflow Dev
#
# This workflow triggers the dev release orchestrator for development and feature branches.
# It creates dev-tagged artifacts and container images for testing.
#
# Triggers:
# - Manual workflow dispatch
#
# Created artifacts:
# - Container images with dev tags
# - See release summary for full details

name: Release Workflow Dev

on:
  workflow_dispatch:

jobs:
  dev-release:
    permissions:
      contents: read # Read code for building
      packages: write # Push dev images to ghcr.io
    # SMOKE TEST: pinned to bjornmolin/reusable-ci feat/rust-first-class-support.
    # Switch to diggsweden/reusable-ci@<v2.8.0-sha> once the official tag is cut.
    uses: bjornmolin/reusable-ci/.github/workflows/release-dev-orchestrator.yml@6c98d46fdb960bc23042e282f42fcfd2f3c54ccf # feat/rust-first-class-support
    with:
      reusable-ci-ref: 6c98d46fdb960bc23042e282f42fcfd2f3c54ccf
      project-type: rust
    secrets: inherit
