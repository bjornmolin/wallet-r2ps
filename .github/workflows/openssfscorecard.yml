name: OpenSSF Scorecard Analysis

on:
  push:
    branches:
      - main
  schedule:
    # Saturdays at 02:40 UTC
    - cron: "40 2 * * 6"
    # Wednesdays at 02:40 UTC
    - cron: "40 2 * * 3"
  workflow_dispatch:

permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed

jobs:
  scorecard-analysis:
    permissions:
      contents: read
      security-events: write
      id-token: write
    # SMOKE TEST: pinned to bjornmolin/reusable-ci feat/rust-first-class-support.
    # Switch to diggsweden/reusable-ci@<v2.8.0-sha> once the official tag is cut.
    uses: bjornmolin/reusable-ci/.github/workflows/security-openssf-scorecard.yml@6c98d46fdb960bc23042e282f42fcfd2f3c54ccf # feat/rust-first-class-support
    with:
      publish-results: true
