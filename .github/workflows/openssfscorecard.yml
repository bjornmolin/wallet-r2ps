name: OpenSSF Scorecard Analysis

on:
  push:
    branches:
      - main
  schedule:
    # Saturdays at 02:40 UTC
    - cron: "40 2 * * 6"
    # Wednesdays at 02:40 UTC
    - cron: "40 2 * * 3"
  workflow_dispatch:

permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed

jobs:
  scorecard-analysis:
    permissions:
      contents: read
      security-events: write
      id-token: write
    uses: diggsweden/reusable-ci/.github/workflows/security-openssf-scorecard.yml@4113becb930aa8ee43e456256e703caf9f86b633 # v2.8.1
    with:
      publish-results: true
