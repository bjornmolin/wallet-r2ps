name: Pull Request Workflow

on:
  pull_request:
    branches:
      - main
      - develop
      - "release/**"
      - "feature/**"

permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    uses: diggsweden/reusable-ci/.github/workflows/pullrequest-orchestrator.yml@4113becb930aa8ee43e456256e703caf9f86b633 # v2.8.1
    secrets: inherit
    permissions:
      contents: read # Clone repository and read source code
      packages: read # Access GitHub Packages
      security-events: write # Upload security scan results to Security tab
    with:
      reusable-ci-ref: 4113becb930aa8ee43e456256e703caf9f86b633
      project-type: cargo
      # Use devbase-check linting (replaces megalint, commitlint, licenselint)
      linters.devbasecheck: true
      linters.megalint: false
      linters.commitlint: false
      linters.licenselint: false
      linters.dependencyreview: true
      # Rust quality gates run via devbase-check's lint-rust*/rust-audit
      # recipes (see justfile), invoked through linters.devbasecheck above.

  test:
    permissions:
      contents: read # Access test resources and source code
      packages: read # Fetch dependencies from GitHub Packages
    uses: ./.github/workflows/test.yml
