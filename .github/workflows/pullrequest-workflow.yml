name: Pull Request Workflow

on:
  pull_request:
    branches:
      - main
      - develop
      - "release/**"
      - "feature/**"

permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    # SMOKE TEST: pinned to bjornmolin/reusable-ci feat/rust-first-class-support.
    # Switch to diggsweden/reusable-ci@<v2.8.0-sha> once the official tag is cut.
    uses: bjornmolin/reusable-ci/.github/workflows/pullrequest-orchestrator.yml@d25942bc9efc0ea2714aba360d476c11465928f6 # feat/rust-first-class-support
    secrets: inherit
    permissions:
      contents: read # Clone repository and read source code
      packages: read # Access GitHub Packages
      security-events: write # Upload security scan results to Security tab
    with:
      reusable-ci-ref: d25942bc9efc0ea2714aba360d476c11465928f6
      project-type: rust
      # Use devbase-check linting (replaces megalint, commitlint, licenselint)
      linters.devbasecheck: true
      linters.megalint: false
      linters.commitlint: false
      linters.licenselint: false
      linters.dependencyreview: true
      # Rust quality gates (provided by reusable-ci v2.8.0)
      linters.clippy: true
      linters.rustfmt: true
      linters.cargoaudit: true
      # Native deps required for clippy to compile the workspace
      rust.apt-packages: "cmake libsasl2-dev libzstd-dev libssl-dev pkg-config zlib1g-dev"

  test:
    permissions:
      contents: read # Access test resources and source code
      packages: read # Fetch dependencies from GitHub Packages
    uses: ./.github/workflows/test.yml
