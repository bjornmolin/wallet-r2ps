# Workspace-level test runner.
#
# Why this exists alongside reusable-ci's build-rust.yml:
# build-rust runs per-artefact (hsm-worker, wallet-bff) in each crate's
# working-directory, which can't express our workspace-wide
# `cargo test --workspace --features hsm-worker/testcontainers,wallet-bff/testcontainers`.
# The release artefacts therefore set `skip-tests: true` and the workspace
# test command lives here, called from pullrequest-workflow.yml.
#
# cargo-audit moved to reusable-ci's lint-rust.yml (linters.cargoaudit).

name: Rust Test

on: [workflow_call]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        # rust-toolchain.toml at repo root pins channel + components.
        run: rustup show active-toolchain >/dev/null 2>&1 || rustup toolchain install

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-testcontainers-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-testcontainers-
            ${{ runner.os }}-cargo-

      - name: Run testcontainer integration tests
        run: cargo test --workspace --exclude integration-load-tests --features hsm-worker/testcontainers,wallet-bff/testcontainers -- --test-threads=1
