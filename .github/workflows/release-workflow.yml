# Release Workflow for wallet-r2ps
# Rust application with container image publishing
name: Release Workflow

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # Stable: v1.0.0
      - "v[0-9]+.[0-9]+.[0-9]+-alpha*" # Alpha: v1.0.0-alpha.1
      - "v[0-9]+.[0-9]+.[0-9]+-beta*" # Beta: v1.0.0-beta.1
      - "v[0-9]+.[0-9]+.[0-9]+-rc*" # RC: v1.0.0-rc.1

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # Queue releases, don't cancel partial releases

permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed

jobs:
  release:
    # SMOKE TEST: pinned to bjornmolin/reusable-ci feat/rust-first-class-support.
    # Switch to diggsweden/reusable-ci@<v2.8.0-sha> once the official tag is cut.
    uses: bjornmolin/reusable-ci/.github/workflows/release-orchestrator.yml@f7ea33405a951a4a44684f84d4aff1caa586433b # feat/rust-first-class-support
    permissions:
      contents: write # Create GitHub releases and tags
      packages: write # Publish images to ghcr.io
      id-token: write # Generate OIDC token for SLSA provenance attestation
      actions: read # Read workflow runs for SLSA provenance generation
      security-events: write # Upload vulnerability scan results from container scanning
      attestations: write # Attach SBOM attestation to container images
    secrets: inherit
    with:
      reusable-ci-ref: f7ea33405a951a4a44684f84d4aff1caa586433b
      artifacts-config: .github/artifacts.yml
      changelog-creator: git-cliff
      release-publisher: github-cli
      # SMOKE TEST: bjornmolin fork lacks OSPO_BOT_GPG_PRIV/PASS secrets.
      # Disable artifact signing to skip GPG import in validate-release-prerequisites.
      release.signartifacts: false
